<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>EMMANUEL'S DREAM HOUSE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="grass" src="./textures/grass1.jpg" alt="" />
        <img id="sky" src="./textures/sunny-sky1.jpg" alt="" />
        <img id="house" alt="./assets/scene.gltf" />
      </a-assets>

      <!-- ===================== -->
      <!-- CAMERA                -->
      <!-- Centered in front of  -->
      <!-- the house, eye-level, -->
      <!-- looking straight ahead -->
      <!-- matching the uploaded  -->
      <!-- front-elevation view  -->
      <!-- ===================== -->
      <a-entity position="38 2 35">
        <a-camera
          look-controls="enabled: true"
          wasd-controls="enabled: true"
          rotation="0 0 0"
        ></a-camera>
      </a-entity>

      <!-- Ambient Light -->
      <a-entity light="type: ambient;"></a-entity>

      <!-- Directional Light -->
      <a-entity
        light="type: directional; color: #EEE; intensity: 0.5"
        position="-1 1 0"
      ></a-entity>

      <!-- Sky -->
      <a-sky
        src="./textures/sunny-sky.jpg"
        rotation="0 64 0"
      ></a-sky>

      <!-- Ground plane -->
      <a-plane
        material="src: #grass; repeat: 5000 5000"
        rotation="-90 0 0"
        scale="10000 10000 1"
      ></a-plane>

      <!-- House model -->
      <a-gltf-model
        position="38 0 5"
        scale="1 1 1"
        src="./assets/scene.gltf"
      ></a-gltf-model>

      <!-- Water feature -->
      <a-entity
        class="a-water"
        opacity="40"
        side="double"
        width="2.1"
        base-color="lightblue"
        foam-color="blue"
        repeat="2"
        voronoi-points="5"
        rotation="90 0 0"
        position="22.335 0.200 -14.757"
        scale="2.6 1.1 1.0"
        animation="property: scale; dur: 50; loop: true; dir: alternate; easing: easeOutElastic"
        material="shader: water; transparent: true; repeat: 200 1; basecolor: lightblue"
      ></a-entity>

    </a-scene>

    <script>
      AFRAME.registerComponent("modify-materials", {
        init: function () {
          this.el.addEventListener("model-loaded", () => {
            const obj = this.el.getObject3D("mesh");
            obj.traverse((node) => {
              if (node.isMesh) {
                node.material.color.set("black");
              }
            });
          });
        },
      });
    </script>

  </body>
</html>
